name: publish-npm

on:
  push:
    tags:
      - "v*"

concurrency:
  group: publish-npm
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Verify tag matches package version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(node --eval "console.log(JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version)")"
          test "$TAG_VERSION" = "$PKG_VERSION" || {
            echo "tag version ($TAG_VERSION) != package.json version ($PKG_VERSION)"
            exit 1
          }

      - name: Verify changelog entry exists
        run: |
          VERSION="$(node --eval "console.log(JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version)")"
          grep -q "^## \[$VERSION\]" CHANGELOG.md || {
            echo "CHANGELOG.md missing entry for $VERSION"
            exit 1
          }

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Check package contents
        run: npm run release:check

      - name: Publish to npm
        run: |
          VERSION="$(node --eval "console.log(JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version)")"
          if printf '%s' "$VERSION" | grep -q -- '-'; then
            DIST_TAG="$(printf '%s' "$VERSION" | sed -E 's/^[0-9]+(\.[0-9]+)*-([0-9A-Za-z]+)(\..*)?$/\2/')"
            npm publish --tag "$DIST_TAG"
          else
            npm publish
          fi
